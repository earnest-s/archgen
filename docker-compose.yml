version: "3.9"

services:
  model:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn backend.api.model_service:app --host 0.0.0.0 --port 9000
    ports:
      - "9000:9000"
    environment:
      HF_HOME: /app/.cache/huggingface
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./.cache:/app/.cache
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:9000/healthz').status == 200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    # Optional GPU support on Linux with NVIDIA Container Toolkit:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      MODEL_URL: ${MODEL_URL:-http://model:9000}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      HF_HOME: /app/.cache/huggingface
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./.cache:/app/.cache
    depends_on:
      model:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz').status == 200 else 1)",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
